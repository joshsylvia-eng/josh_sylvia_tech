<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josh Sylvia - Code Playground</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/playground.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://kit.fontawesome.com/268e20b2a1.js" crossorigin="anonymous"></script>
    <!-- Monaco Editor -->
    <script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>
</head>
<body>
    <!-- Search JavaScript - Must load before navigation -->
    <script src="js/search-functions.js"></script>
    
    <!-- Navigation Component -->
    <div id="navigation-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <h1 class="page-title">Code Playground</h1>
            <p class="page-description">Write, test, and share code in your favorite programming languages with syntax highlighting and live preview.</p>
            
            <!-- IDE Controls -->
            <div class="ide-controls">
                <div class="control-group">
                    <label for="language-select">Language:</label>
                    <select id="language-select" class="language-selector">
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="typescript">TypeScript</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="json">JSON</option>
                        <option value="sql">SQL</option>
                        <option value="bash">Bash</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                        <option value="go">Go</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="theme-select">Theme:</label>
                    <select id="theme-select" class="theme-selector">
                        <option value="vs-dark">VS Code Dark</option>
                        <option value="vs-light">VS Code Light</option>
                        <option value="hc-black">High Contrast</option>
                        <option value="monokai">Monokai</option>
                    </select>
                </div>
                
                <div class="control-buttons">
                    <button id="run-code" class="btn btn-primary">
                        <i class="fas fa-play"></i> Run Code
                    </button>
                    <button id="clear-code" class="btn btn-secondary">
                        <i class="fas fa-trash"></i> Clear
                    </button>
                    <button id="save-code" class="btn btn-secondary">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button id="share-code" class="btn btn-secondary">
                        <i class="fas fa-share"></i> Share
                    </button>
                </div>
            </div>
            
            <!-- Editor Container -->
            <div class="editor-container">
                <div class="editor-panel">
                    <div class="panel-header">
                        <h3>Code Editor</h3>
                        <div class="editor-info">
                            <span id="line-info">Line 1, Col 1</span>
                            <span id="language-info">JavaScript</span>
                        </div>
                    </div>
                    <div id="code-editor" class="code-editor"></div>
                </div>
                
                <div class="output-panel">
                    <div class="panel-header">
                        <h3>Output</h3>
                        <div class="output-controls">
                            <button id="clear-output" class="btn-small">
                                <i class="fas fa-eraser"></i> Clear
                            </button>
                        </div>
                    </div>
                    <div id="output-container" class="output-container">
                        <div class="output-placeholder">Run your code to see the output here...</div>
                    </div>
                </div>
            </div>
            
            <!-- Console Panel -->
            <div class="console-panel">
                <div class="panel-header">
                    <h3>Console</h3>
                    <button id="clear-console" class="btn-small">
                        <i class="fas fa-eraser"></i> Clear
                    </button>
                </div>
                <div id="console-container" class="console-container">
                    <div class="console-placeholder">Console output will appear here...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Share Modal -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Share Code</h2>
                <button class="modal-close" onclick="closeShareModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="share-options">
                    <div class="share-option">
                        <label for="share-url">Share URL:</label>
                        <div class="share-input-group">
                            <input type="text" id="share-url" readonly>
                            <button onclick="copyShareUrl()" class="btn-small">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                        </div>
                    </div>
                    <div class="share-option">
                        <label for="embed-code">Embed Code:</label>
                        <textarea id="embed-code" readonly rows="3"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/playground.js"></script>

    <!-- Load Navigation Component -->
    <script>
        async function loadNavigation() {
            try {
                const response = await fetch('components/navigation.html');
                const navigationHTML = await response.text();
                document.getElementById('navigation-container').innerHTML = navigationHTML;
                
                // Set active page based on current URL
                setActiveNavigation();
            } catch (error) {
                console.error('Error loading navigation:', error);
            }
        }
        
        function setActiveNavigation() {
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const navLinks = document.querySelectorAll('.nav-link');
            const sidebarLinks = document.querySelectorAll('.sidebar-link');
            
            // Remove active classes
            navLinks.forEach(link => link.classList.remove('active'));
            sidebarLinks.forEach(link => link.classList.remove('active'));
            
            // Add active class to current page links
            if (currentPage === 'playground.html') {
                document.querySelector('.nav-link[href="playground.html"]')?.classList.add('active');
                document.querySelector('.sidebar-link[href="playground.html"]')?.classList.add('active');
            }
        }
        
        // Load navigation when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadNavigation();
        });
    </script>
</body>
</html>
